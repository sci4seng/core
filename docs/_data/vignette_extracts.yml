brooks:
  title:       Lift — Brooks Model from Apache Helix
  intro:       |
    The Brooks model expresses the central thesis of *The Mythical
    Man-Month* (Brooks 1975): adding people to a late project makes it
    later. In SD form, two stocks track personnel — veteran developers
    (`Vet`) and new hires (`New`) — and a productivity tax falls on
    veterans whenever newcomers join (training cost + intra-team
    communication overhead). The SD model is in `models/sd.py:brooks()`.
    
    This notebook lifts the model's productivity-tax parameter from
    Apache Helix's git history. We need only the git log and kaiaulu's
    `identity_match` (no proprietary tooling).
    
    **Lift output**: a calibrated value of `brooks_tax` =
    `(pre_velocity - post_velocity) / pre_velocity`, where the velocities
    are veteran commit rates in symmetric windows before and after each
    late-hire event. A positive median supports Brooks; a negative or
    near-zero median is itself a useful falsification — late hires
    *accelerated* veterans on this project.
    
    **Method outline**:
    1. Parse git log via `parse_gitlog(perceval, repo)`.
    2. Resolve developer aliases via `identity_match(...)`.
    3. Detect late-hire events (first-commit ≥ 365 days after project
       start) with `detect_late_hires()`.
    4. For each late hire, compute pre/post veteran commit rates with
       `compute_velocity_changes()`.
    5. Aggregate `brooks_tax` median + mean.
    
    The two helper functions are in `lifts/functions.R`; both are
    candidates for upstream contribution into `kaiaulu/R/`.
  verdict:     |
    The median `brooks_tax` (final cell, below) is **positive on Helix**
    (≈ 0.11). Veterans lose roughly 11% of their commit velocity in the
    90 days after a new committer joins. The size is modest but the
    direction matches Brooks's claim. Family-member tests on 7 more
    projects (in `findings.md` F3) show the same sign for 5 of them, with
    magnitudes 0.03 → 0.31 — large project-to-project variance suggests
    team-size and mentoring practices modulate the effect heavily.
  discussion:  |
    SME's two-part check:
    
    **(1) Bug-count dependency**: this lift does NOT use bug count, so
    the choice of communication source (mbox/github/jira) is irrelevant.
    The lift would work on any git-only project.
    
    **(2) Identity bridging**: we used identity_match on a single source
    (git). The lift does not require comms-to-code bridging. If the
    brooks model were later extended to discriminate bug-introducing
    late-hires from feature-introducing late-hires, JIRA + git
    identity_match would be required, and GitHub would need an extra
    alias source.
  refs:
    - |
    Brooks, F. P. (1975). *The Mythical Man-Month*. Addison-Wesley.
    - |
    coder's SD-framework `models/sd.py:brooks()` (this repo) — encodes
    - |
    the thesis as a `Model(init, step, y, rq, ctrl)` namedtuple.
    - |
    Replication: re-run this notebook on a different Apache project
    - |
    by swapping `../conf/helix.yml` for `../conf/<project>.yml`.

brooksq:
  title:       Lift — Brooksq Model from Apache Helix
  intro:       |
    The `brooksq` model extends Brooks with quality tracking: a late-hire
    boost slows veteran velocity AND raises the bug injection rate, so
    quality-adjusted progress `y = Done - 5*Esc` is hurt twice over. The
    sd.py model declares `boost` as its `ctrl` variable; the thesis says
    y drops when boost increases.
    
    This notebook lifts the quality side of `brooksq` from Apache Helix
    using B-SZZ output (PyDriller). The Brooks side (`brooks_tax`) is
    reused from `lift_brooks.Rmd`.
    
    Calibration outputs:
    
    | sd.py param   | source                                           |
    |---------------|--------------------------------------------------|
    | `brooks_tax`  | veteran velocity drop in post-hire window        |
    | `inj_rate`    | bug-introducing commits per day, pre-hire window |
    | `inj_rate'`   | same, post-hire — the boost-driven increase      |
    | `leak_rate`   | fraction of bugs unfixed past a latency threshold|
  verdict:     
  discussion:  |
    SME's two-part check:
    
    **(1) Bug-count dependency**: this lift DOES depend on bug attribution.
    We use the JIRA-key-in-commit-message heuristic to identify bug-fix
    commits (see `scripts/szz_helix.py`). Datasets without JIRA keys in
    commit messages — pure-GitHub-issue projects — would need a different
    seed mechanism (e.g. linked PR closes).
    
    **(2) Identity bridging**: the brooksq lift uses identity_match on
    git only. SZZ pairs are joined on `commit_hash`, not on developer.
    GitHub would still need an extra alias source if we extended this
    to author-attributed injection rates.
  refs:        []

bugs:
  title:       Lift — Bugs Model (Goel-Okumoto) from Apache Helix
  intro:       |
    The `bugs` model (Goel & Okumoto 1979) is the canonical software-
    reliability-growth thesis: cumulative bug detection follows an
    exponential approach to an asymptotic total. The SD form is in
    `models/sd.py:bugs()`:
    
    $$N(t) = a \cdot (1 - e^{-b \cdot t})$$
    
    where `a` is the eventual total bug population and `b` is the
    discovery rate.
    
    **Input source choice**: bugs needs a bug-count signal with
    timestamps. Helix provides three candidates:
    
    - **GitHub issue dump** (label='bug', closed_at) — used here
    - JIRA dump (issuetype='Bug', resolutiondate) — partial dump only;
      the available window has 0 Bug-type issues
    - commit-message heuristic — too noisy without ground-truth filter
    
    We choose GitHub issues because the dump is complete (1879 issues)
    and the `bug` label provides a clean classifier.
    
    **Method outline**:
    1. Parse all GitHub issue JSON files.
    2. Filter issues with label='bug' AND non-null `closed_at`.
    3. Sort by close time. Build cumulative-N(t) trajectory.
    4. Grid-search Goel-Okumoto fit (a × b parameter pairs).
    5. Output: `a`, `b`, R² fit quality.
  verdict:     |
    The Goel-Okumoto fit predicts an eventual total of ~245 closed bugs
    (`a`) on a discovery rate of `b ≈ 1e-8 per second`. The R² of ~0.62
    indicates a moderate fit — the trajectory deviates from pure
    exponential, suggesting Helix is still in the early discovery regime
    where new sub-systems keep entering the bug-detectable population.
    
    In `models/sd.py:bugs()` terms: the initial `Latent` stock would be
    ≈ 245 (the asymptote), of which 170 have been `Found` to date and
    all 170 are `Fixed`. The model's RQ is "2x initial Latent → ~2x
    eventual Fixed (linearity)" — Helix is the wrong test bed because
    the trajectory hasn't saturated yet. A family-member test on a
    project at or near saturation (e.g. an older project with declining
    bug arrivals) would be a better falsification target.
  discussion:  
  refs:
    - |
    Goel, A. L. & Okumoto, K. (1979). Time-dependent error-detection
    - rate model for software reliability and other performance measures.
    - |
    IEEE Transactions on Reliability*, R-28(3), 206–211.
    - |
    `models/sd.py:bugs()` — the SD model.
    - |
    `scripts/lift_bugs_gh.py` + `scripts/lift_bugs_jira.py` — Python
    - variants for the multi-project sweep that produced the family-
    - member table above.

congruence:
  title:       Lift — Congruence Model (Radio-Silence Brokers) from Helix
  intro:       |
    The `congruence` model (Newman 2015; radio-silence smell port from
    kaiaulu R/smells.R:207; SD form in `models/sd.py:congruence()`) tests
    whether **boundary-spanning developers** ("brokers") hold a
    communication-fragmented project together. Stocks:
    
    ```
    Clusters ──merge_rate──> Brokers ──broker_form──> Cohesion
      ↑                          ↓
    fragment_rate            broker_loss (ctrl)
    ```
    
    `ctrl` = `broker_loss`. Thesis: `broker_loss = 0.3` (sudden loss of
    key brokers) collapses Cohesion because fragmented clusters can no
    longer exchange context.
    
    This lift exercises **SME's sanity-check #2**: a model that needs
    *both* communication and source code, requiring kaiaulu's
    `identity_match` to bridge mbox sender addresses ↔ git author emails.
    Without that bridge, a single human appearing as `asebastian@linkedin`
    in mbox and `asebastian@apache.org` in git is double-counted as two
    nodes — distorting cluster size and broker detection.
    
    **Method outline**:
    1. Parse mbox via `parse_mbox_dir()` (Perceval over all `*.mbox`
       files; helper in `functions.R`).
    2. Parse gitlog via `parse_gitlog()`.
    3. `identity_match` over BOTH sources with
       `name_column = c("author_name_email", "sender")` to merge
       identities across mbox + git.
    4. Build undirected reply graph on identity_id nodes.
    5. Louvain community detection on largest connected component.
    6. Radio-silence broker pass per kaiaulu R/smells.R:207 logic.
    7. Output: Brokers, Clusters, n_incidents, cluster_size_dist.
  verdict:     |
    Helix's communication graph (on identity-matched developers):
    
    - **Brokers**: see count above. Compares to the pre-identity-match
      Python run (`smells/radio_silence.py` on raw mbox senders) which
      found 3 brokers. Any difference is due to identity_match merging
      cross-source aliases that were previously double-counted.
    - **Clusters**: the partition shape says whether Helix has a
      uni-modal or multi-modal communication structure. Helix
      historically shows a [42, 25, 14, 13, 2] cluster-size distribution
      pre-identity-match; with identity_match this should slightly
      consolidate.
    
    The lifted `Brokers` stock plugs into `models/sd.py:congruence()`'s
    init via `scripts/calibrate.py`. Helix's defaults already match the
    model's defaults (Brokers=3, Clusters=5) — this is partly because
    the model was specified with knowledge of an earlier radio_silence
    run. See `findings.md` F4-related methodology note.
  discussion:  
  refs:
    - |
    Newman, M. E. J. (2015). Networks: An Introduction. Oxford UP.
    - |
    Blondel, V. D. et al. (2008). Fast unfolding of communities in
    - |
    large networks. *J. Stat. Mech.*.
    - |
    kaiaulu R/smells.R:207 — the original radio-silence smell.
    - |
    `smells/radio_silence.py` — earlier Python port (this .Rmd
    - supersedes it for paper deliverables).
    - |
    `models/sd.py:congruence()` — the SD model.

debt:
  title:       Lift — Debt Model from Apache Helix
  intro:       |
    The `debt` model (Cunningham 1992) expresses the thesis that shipping
    fast accrues technical debt, which then slows future shipping. The SD
    form has stocks `Feat` (cumulative features), `Debt` (current debt),
    `Vel` (velocity); parameters `born_rate` (debt born per ship),
    `intr_rate` (compounding interest on existing debt), `pay_rate` (debt
    paid by refactoring).
    
    This notebook lifts `debt` from Apache Helix using:
    
    | sd.py param  | source                                            |
    |--------------|---------------------------------------------------|
    | `pay_rate`   | RefactoringMiner: refactor commits / total commits|
    | `born_rate`  | gitlog: share of "big" multi-file commits         |
    | `intr_rate`  | proxy: bug-touch revisit rate on prior-changed files (TODO) |
    
    `intr_rate` remains imperfect from git-alone; either accept fitting via
    `sd.opt()` or refine later using SZZ pairs joined to gitlog churn.
  verdict:     
  discussion:  |
    **(1) Bug-count dependency**: this lift does NOT depend on bug-count,
    so JIRA/GitHub/mbox choice is irrelevant. The lift would work on any
    Java-or-similar project with a git history.
    
    **(2) Identity bridging**: `debt` is whole-project, not per-developer.
    `identity_match` is not required for the lift, though it would be for
    any extension that breaks pay_rate by developer cohort.
  refs:        []

