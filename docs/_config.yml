title: sci4seng/core — MYTHS
description: Models Yielding Testable Hypotheses in Software
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
color_scheme: light
search_enabled: true
heading_anchors: true
aux_links:
  "sci4seng/lifts (R + Rmd)": ["https://github.com/sci4seng/lifts"]
  "sci4seng/data (manifests)": ["https://github.com/sci4seng/data"]
nav_external_links: []
exclude:
  - scripts/
  - Gemfile*
  - vendor/

# Silence upstream-theme Sass deprecation noise (just-the-docs uses
# darken()/lighten() which Sass 1.79+ flags). Theme renders fine;
# this just stops the screenfull of warnings on each rebuild.
sass:
  quiet_deps: true
  silence_deprecations:
    - color-functions
    - global-builtin
    - import
    - slash-div
